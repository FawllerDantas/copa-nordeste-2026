                                                                <div key={idx} style={{display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '8px'}}>
                                                                    <input type="text" list="all-athletes" placeholder="Nome do Atleta" value={p.name} onChange={e => updateHighlightPlayer(game.id, 'threes', idx, 'name', e.target.value.toUpperCase())} style={{flex: 2, padding: '8px', borderRadius: '4px', background: 'var(--future-dust-lighter)', border: '1px solid var(--glass-border)', color: 'var(--text-main)', fontSize: '0.8rem'}} />
                                                                    <input type="number" placeholder="Nº" value={p.number} onChange={e => updateHighlightPlayer(game.id, 'threes', idx, 'number', e.target.value)} style={{flex: 1, maxWidth: '60px', padding: '8px', borderRadius: '4px', background: 'var(--future-dust-lighter)', border: '1px solid var(--glass-border)', color: 'var(--text-main)', fontSize: '0.8rem'}} />
                                                                    <select value={p.team} onChange={e => updateHighlightPlayer(game.id, 'threes', idx, 'team', e.target.value)} style={{flex: 2, padding: '8px', borderRadius: '4px', background: 'var(--future-dust-lighter)', border: '1px solid var(--glass-border)', color: 'var(--text-main)', fontSize: '0.8rem'}}>
                                                                        <option value="">Clube</option>
                                                                        <option value={game.homeTeam}>{game.homeTeam}</option>
                                                                        <option value={game.awayTeam}>{game.awayTeam}</option>
                                                                    </select>
                                                                    <input type="number" placeholder="🎯 Qtde" value={p.points} onChange={e => updateHighlightPlayer(game.id, 'threes', idx, 'points', e.target.value)} style={{flex: 1, maxWidth: '60px', padding: '8px', borderRadius: '4px', background: '#38bdf8', border: 'none', color: '#000', fontWeight: 'bold', fontSize: '0.8rem'}} />
                                                                    <button onClick={() => removeHighlightPlayer(game.id, 'threes', idx)} style={{background: 'var(--danger)', color: 'white', border: 'none', borderRadius: '4px', width: '30px', cursor: 'pointer'}}>X</button>
                                                                </div>
                                                            ))}
                                                        </div>

                                                    </div>
                                                )}
                                                {isAdmin && (
                                                    <div style={{marginTop: '20px', paddingTop: '16px', borderTop: '1px solid var(--glass-border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                                        <div style={{display: 'flex', alignItems: 'center', gap: '8px'}}>
                                                            <span style={{fontSize: '0.8rem', color: 'var(--text-muted)'}}>Status: </span>
                                                            <select className="filter-select" value={game.status || 'pending'} onChange={(e) => updateStatusLocal(game.id, e.target.value)} style={{padding: '6px', fontSize: '0.8rem', height: 'auto', flex: 1}}>
                                                                <option value="pending">A Jogar (Pendente)</option>
                                                                <option value="live">🔴 Em Andamento</option>
                                                                <option value="completed">✓ Encerrado</option>
                                                            </select>
                                                        </div>
                                                        <button className="btn btn-primary" onClick={() => saveGameData(game.id)} style={{padding: '8px 16px', fontSize: '0.8rem'}}>Salvar</button>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </>
                        )}

                        {view === 'stats' && (
                            <>
                                <div className="stats-bento">
                                    <div className="stat-box glass-panel highlight">
                                        <div className="stat-value">{allStats.totalPoints}</div>
                                        <div className="stat-label">Pontos Marcados (Geral)</div>
                                    </div>
                                    <div className="stat-box glass-panel">
                                        <div className="stat-value">{allStats.mostVictories[0]?.[1].vit || 0}</div>
                                        <div className="stat-label">Mais Vitórias</div>
                                    </div>
                                    <div className="stat-box glass-panel">
                                        <div className="stat-value">{games.filter(g => g.status === 'completed').length}</div>
                                        <div className="stat-label">Jogos Concluídos</div>
                                    </div>
                                </div>

                                <div style={{marginTop: '40px', marginBottom: '20px', borderBottom: '2px solid var(--golden-yellow)', paddingBottom: '10px'}}>
                                    <h2 style={{fontSize: '2rem'}}>Estatísticas de Atletas</h2>
                                </div>
                                
                                {allStats.playersOverall?.length > 0 ? (
                                    <>
                                        <div className="stats-bento" style={{marginBottom: '20px'}}>
                                            <div className="stat-box glass-panel highlight" style={{flex: 1, flexDirection: 'row', alignItems: 'center', justifyContent: 'center', gap: '20px', padding: '30px'}}>
                                                <TeamLogo team={allStats.playersOverall[0].team} size={80} />
                                                <div style={{textAlign: 'left'}}>
                                                    <div style={{color: 'var(--golden-yellow)', fontSize: '0.9rem', fontWeight: 'bold', textTransform: 'uppercase', letterSpacing: '2px', marginBottom: '5px'}}>Maior Pontuador da Competição</div>
                                                    <div style={{fontSize: '2.5rem', fontFamily: 'Bebas Neue', lineHeight: 1}}>{allStats.playersOverall[0].name} <span style={{fontSize: '1rem', color: 'var(--text-muted)'}}>#{allStats.playersOverall[0].number}</span></div>
                                                    <div style={{fontSize: '1rem', color: 'var(--text-main)', marginTop: '5px'}}>
                                                        <span style={{background: 'var(--warriors-blue)', padding: '2px 8px', borderRadius: '4px', marginRight: '5px'}}>{allStats.playersOverall[0].team}</span> 
                                                        <span style={{background: 'rgba(255,199,44,0.2)', color: 'var(--golden-yellow)', padding: '2px 8px', borderRadius: '4px'}}>{allStats.playersOverall[0].cat}</span>
                                                    </div>
                                                </div>
                                                <div style={{fontSize: '3.5rem', fontFamily: 'Bebas Neue', color: 'var(--golden-yellow)', marginLeft: '30px', borderLeft: '1px solid rgba(255,255,255,0.2)', paddingLeft: '30px'}}>
                                                    {allStats.playersOverall[0].points} <span style={{fontSize: '1.2rem'}}>Pts</span>
                                                </div>
                                            </div>
                                        </div>

                                        <h3 style={{color: 'var(--text-main)', marginBottom: '15px'}}>🌟 Maiores Pontuadores por Categoria</h3>
                                        <div className="bento-grid" style={{marginBottom: '30px'}}>
                                            {Object.keys(allStats.playersByCategory).sort().map(cat => (
                                                <div key={cat} className="card glass-panel" style={{flex: 1, minWidth: '300px'}}>
                                                    <h2 style={{color: 'var(--golden-yellow)'}}>🏆 Rank Cestinhas {cat}</h2>
                                                    <table>
                                                        <thead><tr><th style={{width: '30px'}}>#</th><th>Atleta / Clube</th><th className="stat-cell" style={{width: '60px'}}>PTs</th></tr></thead>
                                                        <tbody>
                                                            {allStats.playersByCategory[cat].slice(0, 10).map((p, idx) => (
                                                                <tr key={idx}>
                                                                    <td style={{fontWeight: 'bold', color: idx === 0 ? 'var(--golden-yellow)' : 'var(--text-muted)'}}>{idx + 1}º</td>
                                                                    <td className="team-name" style={{display: 'flex', alignItems: 'center', gap: '10px', whiteSpace: 'normal', lineHeight: 1.2}}>
                                                                        <TeamLogo team={p.team} size={35} />
                                                                        <div style={{display: 'flex', flexDirection: 'column', gap: '2px'}}>
                                                                            <span style={{fontSize: '1.1rem'}}>{p.name} <span style={{fontSize: '0.8rem', color: 'var(--text-muted)', fontFamily: 'Inter', fontWeight: 'normal'}}>#{p.number}</span></span>
                                                                            <span style={{fontSize: '0.8rem', color: 'var(--text-muted)', fontFamily: 'Inter', fontWeight: 'normal'}}>{p.team}</span>
                                                                        </div>
                                                                    </td>
                                                                    <td className="stat-cell text-yellow" style={{fontSize: '1.3rem'}}>{p.points}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            ))}
                                        </div>

                                        <h3 style={{color: 'var(--text-main)', marginBottom: '15px'}}>🛡️ Maior Pontuador de Cada Clube</h3>
                                        <div className="bento-grid">
                                            {Object.keys(allStats.playersByClub).sort().map(team => (
                                                <div key={team} className="card glass-panel" style={{flex: 1, minWidth: '280px', padding: '20px'}}>
                                                    <div style={{display: 'flex', alignItems: 'center', gap: '15px', marginBottom: '15px', borderBottom: '1px solid rgba(255,255,255,0.1)', paddingBottom: '10px'}}>
                                                        <TeamLogo team={team} size={40} />
                                                        <h2 style={{color: 'var(--text-main)', margin: 0, fontSize: '1.4rem'}}>{team}</h2>
                                                    </div>
                                                    <table>
                                                        <tbody>
                                                            {allStats.playersByClub[team].slice(0, 3).map((p, idx) => (
                                                                <tr key={idx}>
                                                                    <td style={{fontWeight: 'bold', color: idx === 0 ? 'var(--golden-yellow)' : 'var(--text-muted)', width: '30px'}}>{idx + 1}º</td>
                                                                    <td style={{whiteSpace: 'normal', lineHeight: 1.2}}>
                                                                        <div style={{display: 'flex', flexDirection: 'column', gap: '2px'}}>
                                                                            <span style={{fontSize: '1.1rem'}}>{p.name} <span style={{fontSize: '0.8rem', color: 'var(--text-muted)', fontFamily: 'Inter', fontWeight: 'normal'}}>#{p.number}</span></span>
                                                                            <span style={{fontSize: '0.75rem', color: 'var(--text-muted)', fontFamily: 'Inter', fontWeight: 'normal'}}>Cat: {p.cat}</span>
                                                                        </div>
                                                                    </td>
                                                                    <td className="stat-cell text-yellow" style={{fontSize: '1.3rem'}}>{p.points}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="card glass-panel" style={{textAlign: 'center', padding: '30px', color: 'var(--text-muted)', marginBottom: '30px'}}>
                                        Ainda não há dados de pontuadores (Cestinhas) lançados nos jogos encerrados.
                                    </div>
                                )}
                                
                                {allStats.snipersOverall?.length > 0 && (
                                    <>
                                        <div style={{marginTop: '30px', marginBottom: '20px', borderBottom: '2px solid #38bdf8', paddingBottom: '10px'}}>
                                            <h2 style={{fontSize: '2rem', color: '#38bdf8'}}>🎯 Cestas de 3 pontos (Shooters)</h2>
                                        </div>
                                        
                                        <div className="stats-bento" style={{marginBottom: '20px'}}>
                                            <div className="stat-box glass-panel highlight" style={{flex: 1, flexDirection: 'row', alignItems: 'center', justifyContent: 'center', gap: '20px', padding: '30px', background: 'linear-gradient(135deg, #0f172a 0%, #082f49 100%)', borderColor: 'rgba(56,189,248,0.3)'}}>
                                                <TeamLogo team={allStats.snipersOverall[0].team} size={80} />
                                                <div style={{textAlign: 'left'}}>
                                                    <div style={{color: '#38bdf8', fontSize: '0.9rem', fontWeight: 'bold', textTransform: 'uppercase', letterSpacing: '2px', marginBottom: '5px'}}>Maior Shooter da Competição</div>
                                                    <div style={{fontSize: '2.5rem', fontFamily: 'Bebas Neue', lineHeight: 1}}>{allStats.snipersOverall[0].name} <span style={{fontSize: '1rem', color: 'var(--text-muted)'}}>#{allStats.snipersOverall[0].number}</span></div>
                                                    <div style={{fontSize: '1rem', color: 'var(--text-main)', marginTop: '5px'}}>
                                                        <span style={{background: 'var(--warriors-blue)', padding: '2px 8px', borderRadius: '4px', marginRight: '5px'}}>{allStats.snipersOverall[0].team}</span> 
                                                        <span style={{background: 'rgba(56,189,248,0.2)', color: '#38bdf8', padding: '2px 8px', borderRadius: '4px'}}>{allStats.snipersOverall[0].cat}</span>
                                                    </div>
                                                </div>
                                                <div style={{fontSize: '3.5rem', fontFamily: 'Bebas Neue', color: '#38bdf8', marginLeft: '30px', borderLeft: '1px solid rgba(255,255,255,0.2)', paddingLeft: '30px'}}>
                                                    {allStats.snipersOverall[0].points} <span style={{fontSize: '1.2rem'}}>Cestas</span>
                                                </div>
                                            </div>
                                        </div>

                                        <h3 style={{color: 'var(--text-main)', marginBottom: '15px'}}>🌟 Maiores Shooters por Categoria</h3>
                                        <div className="bento-grid" style={{marginBottom: '30px'}}>
                                            {Object.keys(allStats.snipersByCategory).sort().map(cat => (
                                                <div key={cat} className="card glass-panel" style={{flex: 1, minWidth: '300px', borderColor: 'rgba(56,189,248,0.2)'}}>
                                                    <h2 style={{color: '#38bdf8'}}>🎯 Rank Shooters {cat}</h2>
                                                    <table>
                                                        <thead><tr><th style={{width: '30px'}}>#</th><th>Atleta / Clube</th><th className="stat-cell" style={{width: '60px'}}>3PTs</th></tr></thead>
                                                        <tbody>
                                                            {allStats.snipersByCategory[cat].slice(0, 5).map((p, idx) => (
                                                                <tr key={idx}>
                                                                    <td style={{fontWeight: 'bold', color: idx === 0 ? '#38bdf8' : 'var(--text-muted)'}}>{idx + 1}º</td>
                                                                    <td className="team-name" style={{display: 'flex', alignItems: 'center', gap: '10px', whiteSpace: 'normal', lineHeight: 1.2}}>
                                                                        <TeamLogo team={p.team} size={45} />
                                                                        <div style={{display: 'flex', flexDirection: 'column', gap: '2px'}}>
                                                                            <span style={{fontSize: '1.1rem'}}>{p.name} <span style={{fontSize: '0.8rem', color: 'var(--text-muted)', fontFamily: 'Inter', fontWeight: 'normal'}}>#{p.number}</span></span>
                                                                            <span style={{fontSize: '0.8rem', color: 'var(--text-muted)', fontFamily: 'Inter', fontWeight: 'normal'}}>{p.team}</span>
                                                                        </div>
                                                                    </td>
                                                                    <td className="stat-cell" style={{fontSize: '1.3rem', color: '#38bdf8', fontWeight: 'bold'}}>{p.points}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            ))}
                                        </div>

                                        <h3 style={{color: 'var(--text-main)', marginBottom: '15px'}}>🛡️ Maior Shooter de Cada Clube</h3>
                                        <div className="bento-grid">
                                            {Object.keys(allStats.snipersByClub).sort().map(team => (
                                                <div key={team} className="card glass-panel" style={{flex: 1, minWidth: '280px', padding: '20px', borderColor: 'rgba(56,189,248,0.2)'}}>
                                                    <div style={{display: 'flex', alignItems: 'center', gap: '15px', marginBottom: '15px', borderBottom: '1px solid rgba(255,255,255,0.1)', paddingBottom: '10px'}}>
                                                        <TeamLogo team={team} size={45} />
                                                        <h2 style={{color: 'var(--text-main)', margin: 0, fontSize: '1.4rem'}}>{team}</h2>
                                                    </div>
                                                    <table>
                                                        <tbody>
                                                            {allStats.snipersByClub[team].slice(0, 3).map((p, idx) => (
                                                                <tr key={idx}>
                                                                    <td style={{fontWeight: 'bold', color: idx === 0 ? '#38bdf8' : 'var(--text-muted)', width: '30px'}}>{idx + 1}º</td>
                                                                    <td style={{whiteSpace: 'normal', lineHeight: 1.2}}>
                                                                        <div style={{display: 'flex', flexDirection: 'column', gap: '2px'}}>
                                                                            <span style={{fontSize: '1.1rem'}}>{p.name} <span style={{fontSize: '0.8rem', color: 'var(--text-muted)', fontFamily: 'Inter', fontWeight: 'normal'}}>#{p.number}</span></span>
                                                                            <span style={{fontSize: '0.75rem', color: 'var(--text-muted)', fontFamily: 'Inter', fontWeight: 'normal'}}>Cat: {p.cat}</span>
                                                                        </div>
                                                                    </td>
                                                                    <td className="stat-cell" style={{fontSize: '1.3rem', color: '#38bdf8', fontWeight: 'bold'}}>{p.points}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                )}

                                <div style={{marginTop: '40px', marginBottom: '20px', borderBottom: '2px solid var(--golden-yellow)', paddingBottom: '10px'}}>
                                    <h2 style={{fontSize: '2rem'}}>Métricas de Equipes</h2>
                                </div>
                                <div className="bento-grid">
                                    <div className="card glass-panel">
                                        <h2>🔥 Melhores Ataques</h2>
                                        <table>
                                            <thead><tr><th>Equipe</th><th className="stat-cell">Pontos</th></tr></thead>
                                            <tbody>
                                                {allStats.topScorers.map(([key, data]) => (
                                                    <tr key={key}><td className="team-name" style={{display:'flex', alignItems:'center', gap:'10px'}}><TeamLogo team={data.name} size={25}/> {data.name} <small style={{color:'var(--text-muted)'}}>({data.cat})</small></td><td className="stat-cell text-yellow">{data.cpo}</td></tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="card glass-panel">
                                        <h2>🛡️ Melhores Defesas</h2>
                                        <table>
                                            <thead><tr><th>Equipe</th><th className="stat-cell">Sofridos</th></tr></thead>
                                            <tbody>
                                                {allStats.bestDefense.map(([key, data]) => (
                                                    <tr key={key}><td className="team-name" style={{display:'flex', alignItems:'center', gap:'10px'}}><TeamLogo team={data.name} size={25}/> {data.name} <small style={{color:'var(--text-muted)'}}>({data.cat})</small></td><td className="stat-cell" style={{color:'var(--success)'}}>{data.cco}</td></tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </>
                        )}


                        <footer>
                            Desenvolvido por <a href="mailto:fawller@gmail.com">Fawller Dantas 2026</a>
                        </footer>
                        
                        <div className="sync-badge">
                            <div className={`sync-dot ${isSupabaseConnected ? 'online' : 'offline'}`}></div>
                            {isSupabaseConnected ? 'Nuvem Conectada' : 'Modo Offline (Apenas Local)'}
                        </div>

                        {hoveredStats && (
                            <div className="tooltip-portal" style={{ top: hoveredStats.y, left: hoveredStats.x }}>
                                <div style={{fontWeight: '900', marginBottom: '12px', borderBottom: '1px solid rgba(255,199,44,0.3)', paddingBottom: '8px', fontSize: '1rem'}}>📅 Desempenho: {hoveredStats.team}</div>
                                {games.filter(g => g.category === hoveredStats.cat && g.status === 'completed' && (g.homeTeam === hoveredStats.team || g.awayTeam === hoveredStats.team)).map(g => {
                                    const isHome = g.homeTeam === hoveredStats.team;
                                    const opponent = isHome ? g.awayTeam : g.homeTeam;
                                    const myScore = isHome ? g.homeScore : g.awayScore;
                                    const oppScore = isHome ? g.awayScore : g.homeScore;
                                    const victory = myScore > oppScore;
                                    return (
                                        <div key={g.id} style={{display: 'flex', justifyContent: 'space-between', margin: '8px 0', gap: '24px', alignItems: 'center', backgroundColor: 'rgba(255,255,255,0.05)', padding: '6px', borderRadius: '6px'}}>
                                            <span style={{lineHeight: 1.2}}>Dia {g.day} - {g.time}<br/><span style={{fontSize: '0.75rem', opacity: 0.8}}>vs </span><b>{opponent}</b></span>
                                            <span style={{color: victory ? '#48bb78' : '#f56565', fontWeight: '900', fontSize: '1.05rem', backgroundColor: 'rgba(0,0,0,0.4)', padding: '4px 8px', borderRadius: '4px'}}>{myScore} - {oppScore} {victory ? '(V)' : '(D)'}</span>
                                        </div>
                                    );
                                })}
                                {hoveredStats.jog === 0 && (
                                    <div style={{fontSize: '0.8rem', color: 'var(--text-muted)'}}>Nenhum jogo concluído.</div>
                                )}
                            </div>
                        )}

                        <button 
                            className={`back-to-top ${showScroll ? 'visible' : ''}`}
                            onClick={scrollToTop}
                            title="Voltar ao Topo"
                        >
                            ↑
                        </button>
                    </div>
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
