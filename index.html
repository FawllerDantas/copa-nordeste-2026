<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de Acompanhamento de Resultados - Copa Nordeste Interclubes 2026">
    <meta name="theme-color" content="#667eea">
    <title>Copa Nordeste Interclubes 2026 - Dashboard Pro</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiQ29wYSBOb3JkZXN0ZSAyMDI2Iiwic2hvcnRfbmFtZSI6IkNOSSAyMDI2IiwiZGVzY3JpcHRpb24iOiJTaXN0ZW1hIGRlIEdlcmVuY2lhbWVudG8gZGUgVG9ybmVpbyIsInN0YXJ0X3VybCI6Ii8iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjZmZmZmZmIiwidGhlbWVfY29sb3IiOiIjNjY3ZWVhIn0=">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #764ba2;
            --success: #48bb78;
            --warning: #ed8936;
            --danger: #f56565;
            --info: #4299e1;
            --gray-50: #f7fafc;
            --gray-100: #edf2f7;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e0;
            --gray-400: #a0aec0;
            --gray-500: #718096;
            --gray-600: #4a5568;
            --gray-700: #2d3748;
            --gray-800: #1a202c;
            --gray-900: #171923;
            --rn-color: #e53e3e;
            --pe-color: #4299e1;
            --al-color: #ed8936;
            --ce-color: #48bb78;
            --pb-color: #9f7aea;
        }

        [data-theme="dark"] {
            --gray-50: #171923;
            --gray-100: #1a202c;
            --gray-200: #2d3748;
            --gray-300: #4a5568;
            --gray-400: #718096;
            --gray-500: #a0aec0;
            --gray-600: #cbd5e0;
            --gray-700: #e2e8f0;
            --gray-800: #edf2f7;
            --gray-900: #f7fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 12px;
            transition: background 0.3s;
        }

        [data-theme="dark"] body { background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%); }

        .container { max-width: 1600px; margin: 0 auto; display: flex; flex-direction: column; min-height: 95vh; }

        /* Header Premium */
        .header {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        [data-theme="dark"] .header { background: var(--gray-100); color: var(--gray-900); }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--rn-color), var(--pe-color), var(--al-color), var(--ce-color), var(--pb-color));
        }

        .header-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }

        .logo-section { display: flex; align-items: center; gap: 16px; }

        .logo-cni {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .header-text h1 { color: var(--gray-800); font-size: 24px; font-weight: 800; }
        .header-text p { color: var(--gray-500); font-size: 14px; }

        /* Tabs & Actions */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.1);
            padding: 8px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }

        .tab {
            background: rgba(255,255,255,0.9);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-700);
            transition: all 0.3s;
        }

        .tab.active { background: white; color: var(--primary); box-shadow: 0 4px 16px rgba(102,126,234,0.3); }

        /* Cards */
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] .card { background: var(--gray-100); }

        .card h2 { color: var(--gray-800); font-size: 18px; margin-bottom: 20px; border-bottom: 3px solid var(--gray-200); padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }

        /* Tables & Stats */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { padding: 14px 10px; text-align: left; background: var(--gray-50); color: var(--gray-700); font-size: 11px; text-transform: uppercase; }
        td { padding: 14px 10px; border-bottom: 1px solid var(--gray-200); }

        .highlight { background: var(--primary) !important; color: white !important; font-weight: 700; }
        .stat-cell { text-align: center; }

        /* Game Cards */
        .games-list { display: grid; gap: 16px; }
        .game-card { background: var(--gray-50); border-radius: 16px; padding: 20px; border-left: 5px solid var(--primary); }
        .game-teams { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: center; }
        .score-input { width: 60px; padding: 10px; border: 2px solid var(--gray-200); border-radius: 8px; text-align: center; font-size: 20px; font-weight: 800; }

        /* Filter Bar */
        .filter-bar { background: rgba(255,255,255,0.2); padding: 16px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .filter-group { display: flex; align-items: center; gap: 8px; color: white; font-weight: 600; }
        select { padding: 8px; border-radius: 8px; border: none; font-weight: 600; }

        /* Stats Grid */
        .stats-summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-leader-card { background: white; padding: 20px; border-radius: 16px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .leader-icon { font-size: 32px; background: var(--gray-100); width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .leader-info h4 { font-size: 12px; color: var(--gray-500); text-transform: uppercase; }
        .leader-info p { font-weight: 800; color: var(--gray-800); }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 40px 20px;
            text-align: center;
            color: white;
            font-weight: 600;
            opacity: 0.9;
        }
        footer a { color: white; text-decoration: underline; transition: opacity 0.2s; }
        footer a:hover { opacity: 0.7; }

        .state-badge { width: 6px; height: 20px; border-radius: 3px; display: inline-block; margin-right: 8px; }
        .state-rn { background: var(--rn-color); }
        .state-pe { background: var(--pe-color); }
        .state-al { background: var(--al-color); }
        .state-ce { background: var(--ce-color); }
        .state-pb { background: var(--pb-color); }

        @media (max-width: 768px) {
            .game-teams { grid-template-columns: 1fr; }
            .vs { display: none; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const initialTournamentData = {
            teams: {
                U13: {
                    A: ['DRG (RN)', 'BASQ. PARAÍBA (PB)', 'I. C. PAJUSSARA (AL)', 'AADB (PE)'],
                    B: ['AEROCLUBE (RN)', 'MARECHAIS (AL)', 'SPORT RECIFE (PE)']
                },
                U15: {
                    A: ['AEROCLUBE (RN)', 'SPORT RECIFE (PE)', 'MARECHAIS (AL)'],
                    B: ['DRG 1 (RN)', 'AADB 1 (PE)', 'I.C. PAJUSSARA (AL)'],
                    C: ['DRG 2 (RN)', 'BNB (CE)', 'AADB 2 (PE)']
                },
                U17: {
                    A: ['DRG 1 (RN)', 'FÊNIX GOIANINHA (RN)', 'SPORT RECIFE (PE)', 'BNB (CE)'],
                    B: ['DRG MOSSORÓ (RN)', 'ELITE (RN)', 'FITCAMP (PE)'],
                    C: ['DRG 2 (RN)', 'AEROCLUBE 2 (RN)', 'MARECHAIS (AL)'],
                    D: ['AEROCLUBE 1 (RN)', 'I.C. PAJUSSARA (AL)', 'RA10 (CE)']
                }
            },
            games: [
                { id: 1, category: 'U13', group: 'A', day: '02/04', time: '09H00', venue: 'INSTITUTO BRASIL', homeTeam: 'BASQ. PARAÍBA (PB)', awayTeam: 'I. C. PAJUSSARA (AL)', phase: 'groups' },
                { id: 2, category: 'U17', group: 'D', day: '02/04', time: '10H30', venue: 'INSTITUTO BRASIL', homeTeam: 'AEROCLUBE 1 (RN)', awayTeam: 'I.C. PAJUSSARA (AL)', phase: 'groups' },
                { id: 3, category: 'U15', group: 'B', day: '02/04', time: '12H00', venue: 'INSTITUTO BRASIL', homeTeam: 'DRG 1 (RN)', awayTeam: 'I.C. PAJUSSARA (AL)', phase: 'groups' },
                { id: 4, category: 'U15', group: 'C', day: '02/04', time: '13H30', venue: 'INSTITUTO BRASIL', homeTeam: 'DRG 2 (RN)', awayTeam: 'AADB 2 (PE)', phase: 'groups' },
                { id: 5, category: 'U13', group: 'B', day: '02/04', time: '15H00', venue: 'INSTITUTO BRASIL', homeTeam: 'AEROCLUBE (RN)', awayTeam: 'SPORT RECIFE (PE)', phase: 'groups' },
                { id: 6, category: 'U17', group: 'A', day: '02/04', time: '16H30', venue: 'INSTITUTO BRASIL', homeTeam: 'FÊNIX GOIANINHA (RN)', awayTeam: 'SPORT RECIFE (PE)', phase: 'groups' },
                { id: 7, category: 'U17', group: 'A', day: '02/04', time: '18H00', venue: 'INSTITUTO BRASIL', homeTeam: 'DRG 1 (RN)', awayTeam: 'BNB (CE)', phase: 'groups' },
                { id: 8, category: 'U15', group: 'C', day: '02/04', time: '19H30', venue: 'INSTITUTO BRASIL', homeTeam: 'BNB (CE)', awayTeam: 'AADB 2 (PE)', phase: 'groups' },
                { id: 9, category: 'U13', group: 'B', day: '02/04', time: '10H00', venue: 'IFRN PARNAMIRIM', homeTeam: 'AEROCLUBE (RN)', awayTeam: 'MARECHAIS (AL)', phase: 'groups' },
                { id: 10, category: 'U15', group: 'A', day: '02/04', time: '11H30', venue: 'IFRN PARNAMIRIM', homeTeam: 'AEROCLUBE (RN)', awayTeam: 'MARECHAIS (AL)', phase: 'groups' },
                { id: 11, category: 'U13', group: 'A', day: '02/04', time: '13H00', venue: 'IFRN PARNAMIRIM', homeTeam: 'DRG (RN)', awayTeam: 'BASQ. PARAÍBA (PB)', phase: 'groups' },
                { id: 12, category: 'U17', group: 'C', day: '02/04', time: '14H30', venue: 'IFRN PARNAMIRIM', homeTeam: 'AEROCLUBE 2 (RN)', awayTeam: 'MARECHAIS (AL)', phase: 'groups' },
                { id: 13, category: 'U15', group: 'A', day: '02/04', time: '16H00', venue: 'IFRN PARNAMIRIM', homeTeam: 'SPORT RECIFE (PE)', awayTeam: 'MARECHAIS (AL)', phase: 'groups' },
                { id: 14, category: 'U17', group: 'C', day: '02/04', time: '09H00', venue: 'JORGE TAVARES', homeTeam: 'DRG 2 (RN)', awayTeam: 'AEROCLUBE 2 (RN)', phase: 'groups' },
                { id: 15, category: 'U17', group: 'B', day: '02/04', time: '10H30', venue: 'JORGE TAVARES', homeTeam: 'ELITE (RN)', awayTeam: 'FITCAMP (PE)', phase: 'groups' }
            ]
        };

        const getStateClass = (team) => {
            if (team.includes('(RN)')) return 'state-rn';
            if (team.includes('(PE)')) return 'state-pe';
            if (team.includes('(AL)')) return 'state-al';
            if (team.includes('(CE)')) return 'state-ce';
            if (team.includes('(PB)')) return 'state-pb';
            return '';
        };

        function App() {
            const [activeTab, setActiveTab] = useState('U13');
            const [view, setView] = useState('standings');
            const [isAdmin, setIsAdmin] = useState(() => localStorage.getItem('cni2026_admin') === 'true');
            const [games, setGames] = useState(() => {
                const saved = localStorage.getItem('cni2026_games');
                return saved ? JSON.parse(saved) : initialTournamentData.games;
            });

            // Filtros
            const [filterDay, setFilterDay] = useState('all');
            const [filterVenue, setFilterVenue] = useState('all');
            const [filterStatus, setFilterStatus] = useState('all');
            const [filterTeam, setFilterTeam] = useState('all');

            useEffect(() => {
                localStorage.setItem('cni2026_games', JSON.stringify(games));
            }, [games]);

            // Lista de equipes dinâmica para o filtro
            const teamsInSelectedCategory = useMemo(() => {
                const categoryTeams = initialTournamentData.teams[activeTab];
                return Object.values(categoryTeams).flat();
            }, [activeTab]);

            // Cálculo Geral de Estatísticas por Equipe
            const allStats = useMemo(() => {
                const stats = {};
                
                // Inicializa equipes
                teamsInSelectedCategory.forEach(t => {
                    stats[t] = { name: t, wins: 0, pointsScored: 0, pointsConceded: 0, gamesPlayed: 0 };
                });

                // Processa jogos
                games.filter(g => g.category === activeTab && g.homeScore !== undefined).forEach(g => {
                    if(!stats[g.homeTeam]) return; // Caso mude categoria
                    
                    stats[g.homeTeam].gamesPlayed++;
                    stats[g.awayTeam].gamesPlayed++;
                    stats[g.homeTeam].pointsScored += g.homeScore;
                    stats[g.homeTeam].pointsConceded += g.awayScore;
                    stats[g.awayTeam].pointsScored += g.awayScore;
                    stats[g.awayTeam].pointsConceded += g.homeScore;

                    if(g.homeScore > g.awayScore) stats[g.homeTeam].wins++;
                    else if(g.awayScore > g.homeScore) stats[g.awayTeam].wins++;
                });

                return Object.values(stats);
            }, [games, activeTab, teamsInSelectedCategory]);

            const leaders = useMemo(() => {
                if(allStats.length === 0) return {};
                return {
                    mostWins: [...allStats].sort((a,b) => b.wins - a.wins)[0],
                    bestOffense: [...allStats].sort((a,b) => b.pointsScored - a.pointsScored)[0],
                    bestDefense: [...allStats].sort((a,b) => a.pointsConceded - b.pointsConceded)[0]
                };
            }, [allStats]);

            const updateScore = (gameId, team, score) => {
                if (!isAdmin) return;
                setGames(prev => prev.map(g => {
                    if (g.id === gameId) {
                        return { ...g, [team === 'home' ? 'homeScore' : 'awayScore']: parseInt(score) || 0 };
                    }
                    return g;
                }));
            };

            const filteredGames = useMemo(() => {
                return games.filter(g => {
                    const matchCat = g.category === activeTab;
                    const matchDay = filterDay === 'all' || g.day === filterDay;
                    const matchVenue = filterVenue === 'all' || g.venue === filterVenue;
                    const matchStatus = filterStatus === 'all' || (filterStatus === 'done' ? g.homeScore !== undefined : g.homeScore === undefined);
                    const matchTeam = filterTeam === 'all' || g.homeTeam === filterTeam || g.awayTeam === filterTeam;
                    return matchCat && matchDay && matchVenue && matchStatus && matchTeam;
                });
            }, [games, activeTab, filterDay, filterVenue, filterStatus, filterTeam]);

            return (
                <div className="container">
                    <header className="header">
                        <div className="header-content">
                            <div className="logo-section">
                                <div className="logo-cni">🏀</div>
                                <div className="header-text">
                                    <h1>Copa Nordeste Interclubes 2026</h1>
                                    <p>Dashboard de Alta Performance</p>
                                </div>
                            </div>
                            <div>
                                <button className="tab" onClick={() => setIsAdmin(!isAdmin)}>
                                    {isAdmin ? '🔓 Admin Ativo' : '🔒 Modo Leitura'}
                                </button>
                            </div>
                        </div>
                    </header>

                    <nav className="tabs">
                        {['U13', 'U15', 'U17'].map(cat => (
                            <button key={cat} className={`tab ${activeTab === cat ? 'active' : ''}`} onClick={() => {setActiveTab(cat); setFilterTeam('all');}}>
                                Sub-{cat.slice(1)}
                            </button>
                        ))}
                    </nav>

                    <nav className="tabs">
                        <button className={`tab ${view === 'standings' ? 'active' : ''}`} onClick={() => setView('standings')}>📊 Classificação</button>
                        <button className={`tab ${view === 'games' ? 'active' : ''}`} onClick={() => setView('games')}>📅 Jogos</button>
                        <button className={`tab ${view === 'stats' ? 'active' : ''}`} onClick={() => setView('stats')}>📈 Estatísticas</button>
                    </nav>

                    {view === 'standings' && (
                        <div className="card">
                            <h2>🏆 Tabela de Classificação - {activeTab}</h2>
                            <div className="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Equipe</th>
                                            <th className="stat-cell">Jogos</th>
                                            <th className="stat-cell">Vitórias</th>
                                            <th className="stat-cell highlight">Pontos Pro</th>
                                            <th className="stat-cell">Pontos Contra</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {allStats.sort((a,b) => b.wins - a.wins || b.pointsScored - a.pointsScored).map(s => (
                                            <tr key={s.name}>
                                                <td><span className={`state-badge ${getStateClass(s.name)}`}></span>{s.name}</td>
                                                <td className="stat-cell">{s.gamesPlayed}</td>
                                                <td className="stat-cell">{s.wins}</td>
                                                <td className="stat-cell highlight">{s.pointsScored}</td>
                                                <td className="stat-cell">{s.pointsConceded}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {view === 'games' && (
                        <>
                            <div className="filter-bar">
                                <div className="filter-group">
                                    <span>Dia:</span>
                                    <select value={filterDay} onChange={e => setFilterDay(e.target.value)}>
                                        <option value="all">Todos</option>
                                        <option value="02/04">02/04</option>
                                        <option value="03/04">03/04</option>
                                    </select>
                                </div>
                                <div className="filter-group">
                                    <span>Equipe:</span>
                                    <select value={filterTeam} onChange={e => setFilterTeam(e.target.value)}>
                                        <option value="all">Todas as Equipes</option>
                                        {teamsInSelectedCategory.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                </div>
                                <div className="filter-group">
                                    <span>Status:</span>
                                    <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                                        <option value="all">Todos</option>
                                        <option value="done">Finalizados</option>
                                        <option value="pending">Pendentes</option>
                                    </select>
                                </div>
                            </div>
                            <div className="games-list">
                                {filteredGames.map(g => (
                                    <div key={g.id} className="game-card">
                                        <div style={{marginBottom: '10px', fontSize: '12px', fontWeight: 'bold', color: 'var(--gray-500)'}}>
                                            #{g.id} | {g.day} - {g.time} | {g.venue} | Grupo {g.group}
                                        </div>
                                        <div className="game-teams">
                                            <div style={{textAlign: 'right', fontWeight: 'bold'}}>
                                                {g.homeTeam} <span className={`state-badge ${getStateClass(g.homeTeam)}`}></span>
                                                <input type="number" className="score-input" value={g.homeScore ?? ''} 
                                                    disabled={!isAdmin} onChange={e => updateScore(g.id, 'home', e.target.value)} />
                                            </div>
                                            <div className="vs">VS</div>
                                            <div style={{fontWeight: 'bold'}}>
                                                <input type="number" className="score-input" value={g.awayScore ?? ''} 
                                                    disabled={!isAdmin} onChange={e => updateScore(g.id, 'away', e.target.value)} />
                                                <span className={`state-badge ${getStateClass(g.awayTeam)}`}></span> {g.awayTeam}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </>
                    )}

                    {view === 'stats' && (
                        <>
                            <div className="stats-summary-grid">
                                <div className="stat-leader-card">
                                    <div className="leader-icon">🥇</div>
                                    <div className="leader-info">
                                        <h4>Maior Vencedor</h4>
                                        <p>{leaders.mostWins?.name || '-'} ({leaders.mostWins?.wins} Vitórias)</p>
                                    </div>
                                </div>
                                <div className="stat-leader-card">
                                    <div className="leader-icon">🔥</div>
                                    <div className="leader-info">
                                        <h4>Melhor Ataque</h4>
                                        <p>{leaders.bestOffense?.name || '-'} ({leaders.bestOffense?.pointsScored} Pts)</p>
                                    </div>
                                </div>
                                <div className="stat-leader-card">
                                    <div className="leader-icon">🛡️</div>
                                    <div className="leader-info">
                                        <h4>Melhor Defesa</h4>
                                        <p>{leaders.bestDefense?.name || '-'} ({leaders.bestDefense?.pointsConceded} Pts sofridos)</p>
                                    </div>
                                </div>
                            </div>

                            <div className="card">
                                <h2>📈 Performance por Grupo e Categoria</h2>
                                <div className="table-container">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Equipe</th>
                                                <th>Categoria</th>
                                                <th>Média Pts/Jogo</th>
                                                <th>Aproveitamento</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {allStats.map(s => (
                                                <tr key={s.name}>
                                                    <td>{s.name}</td>
                                                    <td>{activeTab}</td>
                                                    <td>{s.gamesPlayed > 0 ? (s.pointsScored / s.gamesPlayed).toFixed(1) : 0}</td>
                                                    <td>{s.gamesPlayed > 0 ? ((s.wins / s.gamesPlayed) * 100).toFixed(0) : 0}%</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </>
                    )}

                    <footer>
