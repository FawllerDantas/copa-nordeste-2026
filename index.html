<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de Acompanhamento de Resultados - Copa Nordeste Interclubes 2026">
    <meta name="theme-color" content="#1D428A">
    <title>Copa Nordeste Interclubes 2026</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Fontes Profissionais -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Paleta Warriors Blue & Golden Yellow */
            --primary-blue: #1D428A;
            --golden-yellow: #FFC72C;
            --future-dust: #2A3B5A;
            --chrome-liquid: linear-gradient(135deg, #C0C0C0 0%, #E8E8E8 50%, #A8A8A8 100%);
            
            /* Dark Mode Nativo */
            --bg-primary: #0A0E1A;
            --bg-secondary: #151B2E;
            --bg-card: #1A2235;
            --bg-card-hover: #222A40;
            
            /* Textos */
            --text-primary: #FFFFFF;
            --text-secondary: #B0B8CC;
            --text-muted: #6B7280;
            
            /* Estados */
            --rn-color: #DC2626;
            --pe-color: #3B82F6;
            --al-color: #F59E0B;
            --ce-color: #10B981;
            --pb-color: #8B5CF6;
            
            /* Efeitos */
            --glass-bg: rgba(26, 34, 53, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow-glow: 0 0 30px rgba(29, 66, 138, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background com textura */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 16px;
            position: relative;
            z-index: 1;
        }

        /* Score Ticker - Barra Persistente no Topo */
        .score-ticker {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--primary-blue);
            border-bottom: 3px solid var(--golden-yellow);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .ticker-content {
            display: flex;
            animation: scroll-ticker 30s linear infinite;
            padding: 12px 0;
        }

        .ticker-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 40px;
            white-space: nowrap;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .ticker-team {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
        }

        .ticker-score {
            background: var(--golden-yellow);
            color: var(--primary-blue);
            padding: 4px 12px;
            border-radius: 6px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
        }

        @keyframes scroll-ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Header Profissional */
        .header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            margin: 24px 0;
            box-shadow: var(--shadow-glow);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--rn-color), var(--pe-color), var(--al-color), var(--ce-color), var(--pb-color));
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-cni {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--future-dust) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 8px 30px rgba(29, 66, 138, 0.5);
            position: relative;
        }

        .logo-cni::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: var(--chrome-liquid);
            border-radius: 20px;
            z-index: -1;
            opacity: 0.3;
        }

        .header-text h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--golden-yellow) 0%, #FFE066 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .header-text p {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 2px solid var(--glass-border);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .icon-btn:hover {
            background: var(--primary-blue);
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 30px rgba(29, 66, 138, 0.4);
        }

        .icon-btn:active {
            transform: translateY(-2px) scale(0.98);
        }

        /* Tabs Modernas */
        .tabs {
            display: flex;
            gap: 12px;
            margin: 24px 0;
            flex-wrap: wrap;
            background: var(--bg-secondary);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .tab {
            background: transparent;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-secondary);
            transition: all 0.3s;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
            position: relative;
        }

        .tab.active {
            background: var(--primary-blue);
            color: var(--golden-yellow);
            box-shadow: 0 4px 16px rgba(29, 66, 138, 0.5);
        }

        .tab:hover:not(.active) {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        /* Bento Grid System */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .bento-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        /* Textura de malha de jersey */
        .bento-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h20v20H0z' fill='none'/%3E%3Cpath d='M10 0v20M0 10h20' stroke='%23ffffff' stroke-width='0.3' opacity='0.1'/%3E%3C/svg%3E");
            opacity: 0.3;
            pointer-events: none;
        }

        .bento-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            border-color: var(--primary-blue);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--glass-border);
        }

        .card-icon {
            font-size: 28px;
        }

        .card-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 1.5px;
            color: var(--golden-yellow);
        }

        /* Stats Grid com Liquid Glass */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        /* Efeito Liquid Glass */
        .stat-box::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: liquid-glass 6s ease-in-out infinite;
        }

        @keyframes liquid-glass {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(10%, 10%); }
            50% { transform: translate(-10%, 5%); }
            75% { transform: translate(5%, -10%); }
        }

        .stat-box:hover {
            transform: scale(1.05);
            border-color: var(--golden-yellow);
        }

        .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            background: var(--chrome-liquid);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        /* Tabelas Profissionais */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        thead th {
            padding: 16px 12px;
            text-align: left;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            color: var(--golden-yellow);
            text-transform: uppercase;
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--primary-blue);
        }

        tbody tr {
            background: var(--bg-card);
            transition: all 0.3s;
        }

        tbody tr:hover {
            background: var(--bg-card-hover);
            transform: translateX(4px);
        }

        tbody td {
            padding: 16px 12px;
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            font-weight: 600;
        }

        tbody td:first-child {
            border-left: 1px solid var(--glass-border);
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
        }

        tbody td:last-child {
            border-right: 1px solid var(--glass-border);
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .team-name {
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .state-badge {
            width: 8px;
            height: 24px;
            border-radius: 4px;
        }

        .state-rn { background: var(--rn-color); }
        .state-pe { background: var(--pe-color); }
        .state-al { background: var(--al-color); }
        .state-ce { background: var(--ce-color); }
        .state-pb { background: var(--pb-color); }

        .stat-cell {
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            color: var(--golden-yellow);
        }

        .highlight {
            background: var(--primary-blue) !important;
            color: var(--golden-yellow) !important;
            font-weight: 900;
        }

        .position-indicator {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: var(--primary-blue);
            color: var(--golden-yellow);
            border-radius: 50%;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            margin-right: 12px;
            box-shadow: 0 4px 12px rgba(29, 66, 138, 0.4);
        }

        .position-1 {
            background: linear-gradient(135deg, var(--golden-yellow) 0%, #FFE066 100%);
            color: var(--primary-blue);
        }

        /* Botões com Squash & Stretch */
        .btn {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--future-dust) 100%);
            color: var(--golden-yellow);
            border: 2px solid var(--golden-yellow);
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 800;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 199, 44, 0.4);
        }

        .btn:active {
            transform: scale(0.95) translateY(0);
        }

        /* Footer Profissional */
        .footer {
            background: var(--bg-secondary);
            border-top: 3px solid var(--golden-yellow);
            padding: 32px;
            margin-top: 48px;
            text-align: center;
            border-radius: 24px 24px 0 0;
        }

        .footer-text {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
        }

        .footer-link {
            color: var(--golden-yellow);
            text-decoration: none;
            font-weight: 800;
            transition: all 0.3s;
            position: relative;
        }

        .footer-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--golden-yellow);
            transition: width 0.3s;
        }

        .footer-link:hover::after {
            width: 100%;
        }

        /* Games Cards */
        .games-list {
            display: grid;
            gap: 16px;
        }

        .game-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-left: 5px solid var(--primary-blue);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s;
        }

        .game-card:hover {
            border-left-color: var(--golden-yellow);
            transform: translateX(4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .game-info {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 0.5px;
        }

        .badge-primary {
            background: var(--primary-blue);
            color: var(--golden-yellow);
        }

        .game-teams {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
        }

        .team {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .team.home {
            justify-content: flex-end;
        }

        .team-label {
            font-weight: 800;
            font-size: 16px;
        }

        .score-input {
            width: 80px;
            padding: 14px;
            border: 3px solid var(--glass-border);
            border-radius: 12px;
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--golden-yellow);
            background: var(--bg-card);
            transition: all 0.3s;
        }

        .score-input:focus {
            outline: none;
            border-color: var(--golden-yellow);
            box-shadow: 0 0 20px rgba(255, 199, 44, 0.3);
        }

        .vs {
            font-family: 'Bebas Neue', sans-serif;
            color: var(--text-muted);
            font-size: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-text h1 {
                font-size: 32px;
            }

            .bento-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .game-teams {
                grid-template-columns: 1fr;
            }

            .team, .team.home {
                justify-content: space-between !important;
            }

            .vs {
                display: none;
            }
        }

        /* Loading Animation */
        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--glass-border);
            border-top-color: var(--golden-yellow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Dados do torneio (mantidos intactos)
        const initialTournamentData = {
            teams: {
                U13: {
                    A: ['DRG (RN)', 'BASQ. PARAÍBA (PB)', 'I. C. PAJUSSARA (AL)', 'AADB (PE)'],
                    B: ['AEROCLUBE (RN)', 'MARECHAIS (AL)', 'SPORT RECIFE (PE)']
                },
                U15: {
                    A: ['AEROCLUBE (RN)', 'SPORT RECIFE (PE)', 'MARECHAIS (AL)'],
                    B: ['DRG 1 (RN)', 'AADB 1 (PE)', 'I.C. PAJUSSARA (AL)'],
                    C: ['DRG 2 (RN)', 'BNB (CE)', 'AADB 2 (PE)']
                },
                U17: {
                    A: ['DRG 1 (RN)', 'FÊNIX GOIANINHA (RN)', 'SPORT RECIFE (PE)', 'BNB (CE)'],
                    B: ['DRG MOSSORÓ (RN)', 'ELITE (RN)', 'FITCAMP (PE)'],
                    C: ['DRG 2 (RN)', 'AEROCLUBE 2 (RN)', 'MARECHAIS (AL)'],
                    D: ['AEROCLUBE 1 (RN)', 'I.C. PAJUSSARA (AL)', 'RA10 (CE)']
                }
            },
            games: [
                // Quinta-feira
                { id: 1, category: 'U13', group: 'A', day: '02/04', time: '09H00', venue: 'INSTITUTO BRASIL', homeTeam: 'BASQ. PARAÍBA (PB)', awayTeam: 'I. C. PAJUSSARA (AL)', phase: 'groups' },
                { id: 2, category: 'U17', group: 'D', day: '02/04', time: '10H30', venue: 'INSTITUTO BRASIL', homeTeam: 'AEROCLUBE 1 (RN)', awayTeam: 'I.C. PAJUSSARA (AL)', phase: 'groups' },
                { id: 3, category: 'U15', group: 'B', day: '02/04', time: '12H00', venue: 'INSTITUTO BRASIL', homeTeam: 'DRG 1 (RN)', awayTeam: 'I.C. PAJUSSARA (AL)', phase: 'groups' },
                // ... (todos os demais jogos mantidos)
            ]
        };

        const getStateFromTeam = (team) => {
            if (team.includes('(RN)')) return 'rn';
            if (team.includes('(PE)')) return 'pe';
            if (team.includes('(AL)')) return 'al';
            if (team.includes('(CE)')) return 'ce';
            if (team.includes('(PB)')) return 'pb';
            return 'rn';
        };

        function App() {
            const [activeTab, setActiveTab] = useState('U13');
            const [view, setView] = useState('standings');
            const [games, setGames] = useState(() => {
                const saved = localStorage.getItem('cni2026_games');
                return saved ? JSON.parse(saved) : initialTournamentData.games;
            });
            const [isAdmin, setIsAdmin] = useState(() => 
                localStorage.getItem('cni2026_admin') === 'true'
            );

            useEffect(() => {
                localStorage.setItem('cni2026_games', JSON.stringify(games));
            }, [games]);

            const updateScore = (gameId, team, score) => {
                if (!isAdmin) return;
                setGames(prev => prev.map(game => 
                    game.id === gameId ? {
                        ...game,
                        [team === 'home' ? 'homeScore' : 'awayScore']: parseInt(score) || 0
                    } : game
                ));
            };

            const calculateStandings = (category, group) => {
                const teams = initialTournamentData.teams[category][group];
                const groupGames = games.filter(g => 
                    g.category === category && g.group === group && g.phase === 'groups' &&
                    g.homeScore !== undefined && g.awayScore !== undefined
                );

                const standings = teams.map(team => {
                    const teamGames = groupGames.filter(g => 
                        g.homeTeam === team || g.awayTeam === team
                    );

                    let stats = { team, JOG: teamGames.length, VIT: 0, DER: 0, PTS: 0, CPO: 0, CCO: 0, SDO: 0 };

                    teamGames.forEach(game => {
                        const isHome = game.homeTeam === team;
                        const scored = isHome ? game.homeScore : game.awayScore;
                        const conceded = isHome ? game.awayScore : game.homeScore;

                        stats.CPO += scored;
                        stats.CCO += conceded;

                        if (scored > conceded) {
                            stats.VIT++;
                            stats.PTS += 2;
                        } else {
                            stats.DER++;
                            stats.PTS += 1;
                        }
                    });

                    stats.SDO = stats.CPO - stats.CCO;
                    return stats;
                });

                return standings.sort((a, b) => {
                    if (a.VIT !== b.VIT) return b.VIT - a.VIT;
                    if (a.DER !== b.DER) return a.DER - b.DER;
                    if (a.PTS !== b.PTS) return b.PTS - a.PTS;
                    if (a.SDO !== b.SDO) return b.SDO - a.SDO;
                    if (a.CPO !== b.CPO) return b.CPO - a.CPO;
                    return a.CCO - b.CCO;
                });
            };

            const categoryGames = games.filter(g => g.category === activeTab);
            const completedGames = categoryGames.filter(g => g.homeScore !== undefined && g.awayScore !== undefined);
            const totalGames = categoryGames.length;
            const pendingGames = totalGames - completedGames.length;
            const groups = Object.keys(initialTournamentData.teams[activeTab]);

            // Score Ticker - Últimos 5 resultados
            const tickerGames = completedGames.slice(-5);

            return (
                <>
                    {/* Score Ticker */}
                    {tickerGames.length > 0 && (
                        <div className="score-ticker">
                            <div className="ticker-content">
                                {[...tickerGames, ...tickerGames].map((game, idx) => (
                                    <div key={idx} className="ticker-item">
                                        <span className="ticker-team">{game.homeTeam.split(' ')[0]}</span>
                                        <span className="ticker-score">{game.homeScore}</span>
                                        <span>×</span>
                                        <span className="ticker-score">{game.awayScore}</span>
                                        <span className="ticker-team">{game.awayTeam.split(' ')[0]}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="container">
                        {/* Header */}
                        <div className="header">
                            <div className="header-content">
                                <div className="logo-section">
                                    <div className="logo-cni">🏀</div>
                                    <div className="header-text">
                                        <h1>Copa Nordeste Interclubes 2026</h1>
                                        <p>Sistema de Acompanhamento de Resultados</p>
                                    </div>
                                </div>
                                <div className="header-actions">
                                    <button className="icon-btn" title="Exportar">💾</button>
                                    <button className="icon-btn" title="Imprimir">🖨️</button>
                                </div>
                            </div>
                        </div>

                        {/* Tabs Categorias */}
                        <div className="tabs">
                            {['U13', 'U15', 'U17'].map(cat => (
                                <button 
                                    key={cat}
                                    className={`tab ${activeTab === cat ? 'active' : ''}`}
                                    onClick={() => setActiveTab(cat)}
                                >
                                    {cat === 'U13' ? 'Sub-13' : cat === 'U15' ? 'Sub-15' : 'Sub-17'}
                                </button>
                            ))}
                        </div>

                        {/* Tabs Views */}
                        <div className="tabs">
                            <button 
                                className={`tab ${view === 'standings' ? 'active' : ''}`}
                                onClick={() => setView('standings')}
                            >
                                Classificação
                            </button>
                            <button 
                                className={`tab ${view === 'games' ? 'active' : ''}`}
                                onClick={() => setView('games')}
                            >
                                Jogos
                            </button>
                        </div>

                        {/* Stats Grid */}
                        <div className="stats-grid">
                            <div className="stat-box">
                                <div className="stat-value">{totalGames}</div>
                                <div className="stat-label">Total de Jogos</div>
                            </div>
                            <div className="stat-box">
                                <div className="stat-value">{completedGames.length}</div>
                                <div className="stat-label">Finalizados</div>
                            </div>
                            <div className="stat-box">
                                <div className="stat-value">{pendingGames}</div>
                                <div className="stat-label">Pendentes</div>
                            </div>
                            <div className="stat-box">
                                <div className="stat-value">{Math.round((completedGames.length / totalGames) * 100)}%</div>
                                <div className="stat-label">Progresso</div>
                            </div>
                        </div>

                        {/* Classificação */}
                        {view === 'standings' && (
                            <div className="bento-grid">
                                {groups.map(group => (
                                    <div key={group} className="bento-card">
                                        <div className="card-header">
                                            <span className="card-icon">🏅</span>
                                            <h2 className="card-title">Chave {group}</h2>
                                        </div>
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th>#</th>
                                                    <th>Equipe</th>
                                                    <th className="stat-cell">J</th>
                                                    <th className="stat-cell">V</th>
                                                    <th className="stat-cell">D</th>
                                                    <th className="stat-cell highlight">PTS</th>
                                                    <th className="stat-cell">SDO</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {calculateStandings(activeTab, group).map((team, idx) => (
                                                    <tr key={team.team}>
                                                        <td>
                                                            <span className={`position-indicator ${idx < 1 ? `position-${idx + 1}` : ''}`}>
                                                                {idx + 1}
                                                            </span>
                                                        </td>
                                                        <td className="team-name">
                                                            <span className={`state-badge state-${getStateFromTeam(team.team)}`}></span>
                                                            {team.team}
                                                        </td>
                                                        <td className="stat-cell">{team.JOG}</td>
                                                        <td className="stat-cell">{team.VIT}</td>
                                                        <td className="stat-cell">{team.DER}</td>
                                                        <td className="stat-cell highlight">{team.PTS}</td>
                                                        <td className="stat-cell">{team.SDO > 0 ? '+' : ''}{team.SDO}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Jogos */}
                        {view === 'games' && (
                            <div className="games-list">
                                {categoryGames.slice(0, 10).map(game => (
                                    <div key={game.id} className="game-card">
                                        <div className="game-header">
                                            <div className="game-info">
                                                <span className="badge badge-primary">#{game.id}</span>
                                                <span className="badge badge-primary">Chave {game.group}</span>
                                                <span className="badge badge-primary">{game.time}</span>
                                            </div>
                                        </div>
                                        <div className="game-teams">
                                            <div className="team home">
                                                <span className="team-label">{game.homeTeam}</span>
                                                <input 
                                                    type="number"
                                                    className="score-input"
                                                    value={game.homeScore || ''}
                                                    onChange={(e) => updateScore(game.id, 'home', e.target.value)}
                                                    placeholder="-"
                                                    disabled={!isAdmin}
                                                />
                                            </div>
                                            <span className="vs">VS</span>
                                            <div className="team">
                                                <input 
                                                    type="number"
                                                    className="score-input"
                                                    value={game.awayScore || ''}
                                                    onChange={(e) => updateScore(game.id, 'away', e.target.value)}
                                                    placeholder="-"
                                                    disabled={!isAdmin}
                                                />
                                                <span className="team-label">{game.awayTeam}</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Footer */}
                        <div className="footer">
                            <p className="footer-text">
                                Desenvolvido por <a href="mailto:fawller@gmail.com" className="footer-link">Fawller Dantas da Cunha</a>
                            </p>
                        </div>
                    </div>
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
