                                                        {g.status === 'completed' && (
                                                            <div style={{textAlign: 'center', background: 'rgba(0,0,0,0.3)', padding: '10px', borderRadius: '8px'}}>
                                                                <span style={{fontSize: '1.8rem', fontWeight: '900', color: victory === 'VITÓRIA' ? 'var(--success)' : (victory === 'DERROTA' ? 'var(--danger)' : 'var(--text-main)')}}>{myScore} - {oppScore}</span>
                                                            </div>
                                                        )}
                                                        {g.status === 'live' && <div style={{textAlign: 'center', color: 'var(--danger)', fontWeight: 'bold', animation: 'pulse 2s infinite'}}>🔴 EM ANDAMENTO</div>}
                                                    </div>
                                                    {i < arr.length - 1 && <div className="timeline-arrow">▶</div>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'ranking' && (
                            <div className="standings-container">
                                <div style={{marginTop: '20px', marginBottom: '20px', borderBottom: '2px solid var(--golden-yellow)', paddingBottom: '10px', width: '100%', maxWidth: '900px'}}>
                                    <h2 style={{fontSize: '2rem'}}>Ranking Final por Categoria</h2>
                                </div>
                                <div className="bento-grid" style={{width: '100%', maxWidth: '900px'}}>
                                    {selectedCategories.length === 0 ? (
                                        <div className="empty-state glass-panel">Selecione pelo menos uma categoria acima para visualizar o ranking.</div>
                                            ) : selectedCategories.map(cat => {
                                                const catGames = dynamicGames.filter(g => g.category === cat);
                                                const finalRank = [];
                                                
                                                const finalGame = catGames.find(g => g.group === 'FINAL');
                                                const thirdGame = catGames.find(g => g.group === '3º/4º');
                                                let c1 = 'VENC. FINAL', c2 = 'PERD. FINAL', c3 = 'VENC. 3º/4º', c4 = 'PERD. 3º/4º';
                                                
                                                if (finalGame && finalGame.status === 'completed' && finalGame.homeScore != null && finalGame.awayScore != null) {
                                                    c1 = finalGame.homeScore > finalGame.awayScore ? finalGame.homeTeam : finalGame.awayTeam;
                                                    c2 = finalGame.homeScore > finalGame.awayScore ? finalGame.awayTeam : finalGame.homeTeam;
                                                }
                                                if (thirdGame && thirdGame.status === 'completed' && thirdGame.homeScore != null && thirdGame.awayScore != null) {
                                                    c3 = thirdGame.homeScore > thirdGame.awayScore ? thirdGame.homeTeam : thirdGame.awayTeam;
                                                    c4 = thirdGame.homeScore > thirdGame.awayScore ? thirdGame.awayTeam : thirdGame.homeTeam;
                                                }
                                                finalRank.push({ pos: 1, team: c1 });
                                                finalRank.push({ pos: 2, team: c2 });
                                                finalRank.push({ pos: 3, team: c3 });
                                                finalRank.push({ pos: 4, team: c4 });

                                                const stdA = calculateStandings(cat, 'A');
                                                const stdB = calculateStandings(cat, 'B');
                                                let nonQualifiers = [];
                                                if (cat === 'U13') {
                                                    if (stdA[2]) nonQualifiers.push({team: stdA[2].team, pos: 3, PTS: stdA[2].PTS, SDO: stdA[2].SDO, CPO: stdA[2].CPO});
                                                    if (stdA[3]) nonQualifiers.push({team: stdA[3].team, pos: 4, PTS: stdA[3].PTS, SDO: stdA[3].SDO, CPO: stdA[3].CPO});
                                                    if (stdB[2]) nonQualifiers.push({team: stdB[2].team, pos: 3, PTS: stdB[2].PTS, SDO: stdB[2].SDO, CPO: stdB[2].CPO});
                                                } else if (cat === 'U15') {
                                                    const stdC = calculateStandings(cat, 'C');
                                                    const seconds = [stdA[1], stdB[1], stdC[1]].filter(Boolean).sort((a,b) => {
                                                        if (b.PTS !== a.PTS) return b.PTS - a.PTS;
                                                        if (b.SDO !== a.SDO) return b.SDO - a.SDO;
                                                        return b.CPO - a.CPO;
                                                    });
                                                    seconds.slice(1).forEach(t => { if (t) nonQualifiers.push({team: t.team, pos: 2, PTS: t.PTS, SDO: t.SDO, CPO: t.CPO}); });
                                                    if (stdA[2]) nonQualifiers.push({team: stdA[2].team, pos: 3, PTS: stdA[2].PTS, SDO: stdA[2].SDO, CPO: stdA[2].CPO});
                                                    if (stdB[2]) nonQualifiers.push({team: stdB[2].team, pos: 3, PTS: stdB[2].PTS, SDO: stdB[2].SDO, CPO: stdB[2].CPO});
                                                    if (stdC[2]) nonQualifiers.push({team: stdC[2].team, pos: 3, PTS: stdC[2].PTS, SDO: stdC[2].SDO, CPO: stdC[2].CPO});
                                                } else if (cat === 'U17') {
                                                    const stdC = calculateStandings(cat, 'C');
                                                    const stdD = calculateStandings(cat, 'D');
                                                    if (stdA[1]) nonQualifiers.push({team: stdA[1].team, pos: 2, PTS: stdA[1].PTS, SDO: stdA[1].SDO, CPO: stdA[1].CPO});
                                                    if (stdA[2]) nonQualifiers.push({team: stdA[2].team, pos: 3, PTS: stdA[2].PTS, SDO: stdA[2].SDO, CPO: stdA[2].CPO});
                                                    if (stdA[3]) nonQualifiers.push({team: stdA[3].team, pos: 4, PTS: stdA[3].PTS, SDO: stdA[3].SDO, CPO: stdA[3].CPO});
                                                    if (stdB[1]) nonQualifiers.push({team: stdB[1].team, pos: 2, PTS: stdB[1].PTS, SDO: stdB[1].SDO, CPO: stdB[1].CPO});
                                                    if (stdB[2]) nonQualifiers.push({team: stdB[2].team, pos: 3, PTS: stdB[2].PTS, SDO: stdB[2].SDO, CPO: stdB[2].CPO});
                                                    if (stdC[1]) nonQualifiers.push({team: stdC[1].team, pos: 2, PTS: stdC[1].PTS, SDO: stdC[1].SDO, CPO: stdC[1].CPO});
                                                    if (stdC[2]) nonQualifiers.push({team: stdC[2].team, pos: 3, PTS: stdC[2].PTS, SDO: stdC[2].SDO, CPO: stdC[2].CPO});
                                                    if (stdD[1]) nonQualifiers.push({team: stdD[1].team, pos: 2, PTS: stdD[1].PTS, SDO: stdD[1].SDO, CPO: stdD[1].CPO});
                                                    if (stdD[2]) nonQualifiers.push({team: stdD[2].team, pos: 3, PTS: stdD[2].PTS, SDO: stdD[2].SDO, CPO: stdD[2].CPO});
                                                }
                                                nonQualifiers.sort((a,b) => {
                                                    if (a.pos !== b.pos) return a.pos - b.pos;
                                                    if (b.PTS !== a.PTS) return b.PTS - a.PTS;
                                                    if (b.SDO !== a.SDO) return b.SDO - a.SDO;
                                                    return b.CPO - a.CPO;
                                                });
                                                
                                                nonQualifiers.forEach((nq, idx) => finalRank.push({ pos: idx + 5, team: nq.team }));
                                                
                                                const classGames = catGames.filter(g => g.phase === 'classification' && g.status === 'completed' && g.homeScore != null && g.awayScore != null);
                                                classGames.forEach(g => {
                                                    const homeIdx = finalRank.findIndex(r => r.team === g.homeTeam);
                                                    const awayIdx = finalRank.findIndex(r => r.team === g.awayTeam);
                                                    if (homeIdx !== -1 && awayIdx !== -1) {
                                                        const winTeam = g.homeScore > g.awayScore ? g.homeTeam : g.awayTeam;
                                                        const loseTeam = g.homeScore > g.awayScore ? g.awayTeam : g.homeTeam;
                                                        const pos1 = Math.min(finalRank[homeIdx].pos, finalRank[awayIdx].pos);
                                                        const pos2 = Math.max(finalRank[homeIdx].pos, finalRank[awayIdx].pos);
                                                        finalRank.find(r => r.team === winTeam).pos = pos1;
                                                        finalRank.find(r => r.team === loseTeam).pos = pos2;
                                                    }
                                                });
                                                finalRank.sort((a, b) => a.pos - b.pos);

                                                return (
                                                    <div key={cat} className="card glass-panel" style={{flex: 1, minWidth: '300px'}}>
                                                        <h2 style={{color: 'var(--warriors-blue-light)'}}>🏆 Classificação Final {cat}</h2>
                                                        <table>
                                                            <thead><tr><th style={{width: '60px'}}>Pos</th><th>Clube</th></tr></thead>
                                                            <tbody>
                                                                {finalRank.map((r, idx) => (
                                                                    <tr key={idx}>
                                                                        <td style={{fontWeight: 'bold', color: r.pos <= 3 ? 'var(--golden-yellow)' : 'var(--text-muted)'}}>{r.pos}º</td>
                                                                        <td
                                                                            className="team-name"
                                                                            style={{display: 'flex', alignItems: 'center', gap: '10px'}}
                                                                            onMouseEnter={r.pos === 1 ? (e) => {
                                                                                const rect = e.currentTarget.getBoundingClientRect();
                                                                                const x = (rect.left + rect.width / 2) / window.innerWidth;
                                                                                const y = (rect.top + rect.height / 2) / window.innerHeight;
                                                                                if (window.confetti) window.confetti({ particleCount: 130, spread: 80, origin: { x, y }, colors: ['#FFC72C', '#1D428A', '#ffffff', '#48bb78'] });
                                                                            } : undefined}
                                                                        >
                                                                            <TeamLogo team={r.team} size={30} /> {r.team}
                                                                        </td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                );
                                            })}
                                </div>
                                
                                {/* 1. MAIORES CESTINHAS DA COMPETIÇÃO */}
                                {allStats.playersOverall?.length > 0 && (
                                    <>
                                        <h3 style={{color: 'var(--text-main)', marginBottom: '15px', marginTop: '40px', width: '100%', maxWidth: '900px', textAlign: 'center'}}>🌟 Ranking Geral: Cestinhas por Categoria</h3>
                                        <div className="bento-grid" style={{marginBottom: '30px', width: '100%', maxWidth: '900px'}}>
                                            {Object.keys(allStats.playersByCategory).sort().filter(cat => selectedCategories.includes(cat)).map(cat => (
                                                <div key={cat} className="card glass-panel" style={{flex: 1, minWidth: '300px'}}>
                                                    <h2 style={{color: 'var(--golden-yellow)'}}>🏆 Cestinhas {cat}</h2>
                                                    <table>
                                                        <thead><tr><th style={{width: '30px'}}>#</th><th>Atleta / Clube</th><th className="stat-cell" style={{width: '60px'}}>PTs</th></tr></thead>
                                                        <tbody>
                                                            {allStats.playersByCategory[cat].filter(p => p.globalRank === 1).map((p, idx) => (
                                                                <tr key={idx}>
                                                                    <td style={{fontWeight: 'bold', color: 'var(--golden-yellow)'}}>{p.globalRank}º</td>
                                                                    <td className="team-name" style={{display: 'flex', alignItems: 'center', gap: '10px', whiteSpace: 'normal', lineHeight: 1.2}}><TeamLogo team={p.team} size={35} />
                                                                        <div style={{display: 'flex', flexDirection: 'column', gap: '2px'}}>
                                                                            <span style={{fontSize: '1.1rem'}}>{p.name} <span style={{fontSize: '0.8rem', color: 'var(--text-muted)', fontFamily: 'Inter', fontWeight: 'normal'}}>#{p.number}</span></span>
                                                                            <span style={{fontSize: '0.8rem', color: 'var(--text-muted)', fontFamily: 'Inter', fontWeight: 'normal'}}>{p.team}</span>
                                                                        </div>
                                                                    </td>
                                                                    <td className="stat-cell text-yellow" style={{fontSize: '1.3rem'}}>{p.points}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                )}

                                {/* 2. MAIORES SHOOTERS DA COMPETIÇÃO */}
                                {allStats.snipersOverall?.length > 0 && (
                                    <>
                                        <h3 style={{color: '#38bdf8', marginBottom: '15px', marginTop: '30px', width: '100%', maxWidth: '900px', textAlign: 'center'}}>🎯 Ranking Geral: Shooters por Categoria</h3>
                                        <div className="bento-grid" style={{marginBottom: '30px', width: '100%', maxWidth: '900px'}}>
                                            {Object.keys(allStats.snipersByCategory).sort().filter(cat => selectedCategories.includes(cat)).map(cat => (
                                                <div key={cat} className="card glass-panel" style={{flex: 1, minWidth: '300px', borderColor: 'rgba(56,189,248,0.2)'}}>
                                                    <h2 style={{color: '#38bdf8'}}>🎯 Ranking Shooters {cat}</h2>
                                                    <table>
                                                        <thead><tr><th style={{width: '30px'}}>#</th><th>Atleta / Clube</th><th className="stat-cell" style={{width: '90px'}}>CESTAS DE 3PTS</th></tr></thead>
                                                        <tbody>
                                                            {allStats.snipersByCategory[cat].filter(p => p.globalRank === 1).map((p, idx) => (
                                                                <tr key={idx}>
                                                                    <td style={{fontWeight: 'bold', color: '#38bdf8'}}>{p.globalRank}º</td>
                                                                    <td className="team-name" style={{display: 'flex', alignItems: 'center', gap: '10px', whiteSpace: 'normal', lineHeight: 1.2}}><TeamLogo team={p.team} size={35} />
                                                                        <div style={{display: 'flex', flexDirection: 'column', gap: '2px'}}>
                                                                            <span style={{fontSize: '1.1rem'}}>{p.name} <span style={{fontSize: '0.8rem', color: 'var(--text-muted)', fontFamily: 'Inter', fontWeight: 'normal'}}>#{p.number}</span></span>
                                                                            <span style={{fontSize: '0.8rem', color: 'var(--text-muted)', fontFamily: 'Inter', fontWeight: 'normal'}}>{p.team}</span>
                                                                        </div>
                                                                    </td>
                                                                    <td className="stat-cell" style={{fontSize: '1.3rem', color: '#38bdf8', fontWeight: 'bold'}}>{p.points}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {view === 'allstar' && (
                            <div className="allstar-container">
                                {!isAdmin ? (
                                    <div className="bento-grid">
                                        <div className="card glass-panel" style={{gridColumn: '1 / -1', textAlign: 'center', padding: '60px 24px', borderColor: 'rgba(255,199,44,0.3)'}}>
                                            <div style={{fontSize: '4rem', marginBottom: '20px', filter: 'drop-shadow(0 4px 12px rgba(255,199,44,0.4))'}}>🏀</div>
                                            <h2 style={{color: 'var(--golden-yellow)', fontSize: '2rem', marginBottom: '12px', borderBottom: 'none'}}>All-Star 2026</h2>
                                            <p style={{color: 'var(--text-muted)', fontSize: '1.05rem', maxWidth: '480px', margin: '0 auto', lineHeight: '1.7'}}>
                                                Em breve — o All-Star será anunciado após a 1ª Etapa.
                                            </p>
                                            <div style={{marginTop: '28px', display: 'inline-flex', gap: '8px', alignItems: 'center', background: 'rgba(255,199,44,0.08)', border: '1px solid rgba(255,199,44,0.2)', borderRadius: '12px', padding: '10px 20px'}}>
                                                <span style={{color: 'var(--golden-yellow)', fontSize: '0.9rem', fontWeight: 600}}>Fique ligado nas novidades</span>
                                                <span style={{fontSize: '1rem'}}>⭐</span>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                <>
                                <div className="card glass-panel" style={{marginBottom: '20px', borderColor: 'var(--success)'}}>
                                    <h2 style={{color: 'var(--success)'}}>🛠️ Adicionar Evento (Admin)</h2>
                                    <div style={{display: 'flex', gap: '10px'}}>
                                        <input id="newEventTitle" placeholder="Título (ex: Torneio de Enterradas)" style={{flex: 1, padding: '10px', borderRadius: '8px', border: 'none'}} />
                                        <button className="btn btn-primary" onClick={async () => {
                                            const title = document.getElementById('newEventTitle').value;
                                            if (!title) return;
                                            const newEvt = { id: Date.now(), title, athletes: [] };
                                            const { error } = await supabaseClient.from('all_star_events').upsert({ id: newEvt.id, title: newEvt.title, athletes: newEvt.athletes });
                                            if (!error) { setAllStarEvents([...allStarEvents, newEvt].sort((a,b)=>a.id-b.id)); document.getElementById('newEventTitle').value = ''; }
                                        }}>Criar</button>
                                    </div>
                                </div>

                                <div className="bento-grid">
                                    {allStarEvents.map((evt) => (
                                        <div key={evt.id} className="card glass-panel" style={{flex: 1, minWidth: '320px'}}>
                                            <h2 style={{color: 'var(--golden-yellow)'}}>🌟 {evt.title}</h2>
                                            {isAdmin && (
                                                <div style={{background: 'rgba(0,0,0,0.2)', padding: '10px', borderRadius: '8px', marginBottom: '15px'}}>
                                                    <div style={{display: 'flex', gap: '5px', flexWrap: 'wrap', marginBottom: '8px'}}>
                                                        <input id={`evt_${evt.id}_pos`} placeholder="Posição" style={{width: '60px', padding: '5px', borderRadius: '5px'}}/>
                                                        <input id={`evt_${evt.id}_name`} placeholder="Atleta" style={{flex: 1, minWidth: '100px', padding: '5px', borderRadius: '5px'}}/>
                                                    </div>
                                                    <div style={{display: 'flex', gap: '5px', flexWrap: 'wrap'}}>
                                                        <input id={`evt_${evt.id}_team`} placeholder="Clube" style={{flex: 1, minWidth: '80px', padding: '5px', borderRadius: '5px'}}/>
                                                        <input id={`evt_${evt.id}_cat`} placeholder="Cat" style={{width: '60px', padding: '5px', borderRadius: '5px'}}/>
                                                        <input id={`evt_${evt.id}_pts`} placeholder="Pts/Tempo" style={{width: '80px', padding: '5px', borderRadius: '5px'}}/>
                                                    </div>
                                                    <button className="btn btn-primary" style={{marginTop: '10px', width: '100%'}} onClick={async () => {
                                                        const p = document.getElementById(`evt_${evt.id}_pos`).value;
                                                        const n = document.getElementById(`evt_${evt.id}_name`).value;
                                                        const t = document.getElementById(`evt_${evt.id}_team`).value;
                                                        const c = document.getElementById(`evt_${evt.id}_cat`).value;
                                                        const ptt = document.getElementById(`evt_${evt.id}_pts`).value;
                                                        if(!n || !p) return;
                                                        const updatedAthletes = [...(evt.athletes || []), { pos: p, name: n, team: t, category: c, points: ptt }].sort((a,b) => parseInt(a.pos) - parseInt(b.pos));
                                                        const updatedEvt = { ...evt, athletes: updatedAthletes };
                                                        const { error } = await supabaseClient.from('all_star_events').upsert({ id: updatedEvt.id, title: updatedEvt.title, athletes: updatedEvt.athletes });
                                                        if (!error) {
                                                            setAllStarEvents(prev => prev.map(x => x.id === evt.id ? updatedEvt : x).sort((a,b)=>a.id-b.id));
                                                            [`pos`,`name`,`team`,`cat`,`pts`].forEach(id => document.getElementById(`evt_${evt.id}_${id}`).value = '');
                                                        }
                                                    }}>Adicionar Participante/Vencedor</button>
                                                </div>
                                            )}
                                            
                                            {evt.athletes && evt.athletes.length > 0 ? (
                                                <table>
                                                    <thead><tr><th style={{width: '40px'}}>Pos</th><th>Atleta</th><th className="stat-cell">Métrica</th></tr></thead>
                                                    <tbody>
                                                        {evt.athletes.map((ath, idx) => (
                                                            <tr key={idx}>
                                                                <td style={{fontWeight: 'bold', color: parseInt(ath.pos) === 1 ? 'var(--golden-yellow)' : 'var(--text-muted)'}}>{ath.pos}º</td>
                                                                <td className="team-name" style={{whiteSpace: 'normal', lineHeight: 1.2}}>
                                                                    <div style={{display: 'flex', flexDirection: 'column', gap: '2px'}}>
                                                                        <span style={{fontSize: '1.1rem'}}>{ath.name}</span>
                                                                        <span style={{fontSize: '0.8rem', color: 'var(--text-muted)'}}>{ath.team} • {ath.category}</span>
                                                                    </div>
                                                                </td>
                                                                <td className="stat-cell" style={{color: '#38bdf8', fontWeight: 'bold'}}>{ath.points}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            ) : (
                                                <div style={{textAlign: 'center', color: 'var(--text-muted)', padding: '20px'}}>Nenhum resultado registrado.</div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                </>
                                )}
                            </div>
                        )}

                        <footer>
                            <div style={{display: 'flex', gap: '20px', justifyContent: 'center', flexWrap: 'wrap', marginBottom: '20px'}}>
                                <a href="https://www.instagram.com/copanordesteinterclubes/" target="_blank" rel="noopener noreferrer" style={{background: 'var(--golden-yellow)', color: '#000', fontWeight: '700', borderRadius: '12px', padding: '10px 20px', display: 'flex', gap: '8px', alignItems: 'center', textDecoration: 'none'}}>
                                    <img src="./assets/logos/logocni-ig.png" alt="CNI" style={{height: '24px', objectFit: 'contain'}}/> Siga a @copanordesteinterclubes
                                </a>
                                <a href="https://www.instagram.com/desportivoriogrande?igsh=eWZ3OHo0ZzM0bGww" target="_blank" rel="noopener noreferrer" style={{background: 'var(--warriors-blue)', color: '#fff', fontWeight: '700', borderRadius: '12px', padding: '10px 20px', display: 'flex', gap: '8px', alignItems: 'center', textDecoration: 'none'}}>
                                    <img src="./assets/logos/logodrg-ig.png" alt="DRG" style={{height: '24px', objectFit: 'contain'}}/> Organização: Desportivo Rio Grande
                                </a>
                            </div>
                            <div style={{display: 'flex', justifyContent: 'center', marginBottom: '20px'}}>
                                <a href="https://www.youtube.com/live/phKTmn52CoE?si=t62lPjmy1Du-Dhsx" target="_blank" rel="noopener noreferrer" style={{background: '#131420', color: 'var(--golden-yellow)', border: '1px solid var(--golden-yellow)', fontWeight: '700', borderRadius: '12px', padding: '10px 20px', display: 'flex', gap: '8px', alignItems: 'center', textDecoration: 'none'}}>
                                    Assista ao Vivo pelo Canal <img src="./assets/logos/gametimetv.png" alt="Game Time TV" style={{height: '24px', objectFit: 'contain', margin: '0 8px'}}/> Game Time TV
                                </a>
                            </div>
                            <div style={{color: 'var(--text-muted)', textAlign: 'center'}}>
                                Desenvolvido por <span style={{color: 'var(--golden-yellow)'}}>Fawller Dantas 2026</span>
                            </div>
                        </footer>
                        
                        <div className="sync-badge">
                            <div className={`sync-dot ${isSupabaseConnected ? 'online' : 'offline'}`}></div>
                            {isSupabaseConnected ? 'Nuvem Conectada' : 'Modo Offline (Apenas Local)'}
                        </div>

                        {hoveredStats && (
                            <div className="tooltip-portal" style={{ top: hoveredStats.y, left: hoveredStats.x }}>
                                <div style={{fontWeight: '900', marginBottom: '12px', borderBottom: '1px solid rgba(255,199,44,0.3)', paddingBottom: '8px', fontSize: '1rem'}}>📅 Desempenho: {hoveredStats.team}</div>
                                {games.filter(g => g.category === hoveredStats.cat && g.status === 'completed' && (g.homeTeam === hoveredStats.team || g.awayTeam === hoveredStats.team) && (hoveredStats.phaseType === 'groups' ? g.phase === 'groups' : true)).map(g => {
                                    const isHome = g.homeTeam === hoveredStats.team;
                                    const opponent = isHome ? g.awayTeam : g.homeTeam;
                                    const myScore = isHome ? g.homeScore : g.awayScore;
                                    const oppScore = isHome ? g.awayScore : g.homeScore;
                                    const victory = myScore > oppScore;
                                    return (
                                        <div key={g.id} style={{display: 'flex', justifyContent: 'space-between', margin: '8px 0', gap: '24px', alignItems: 'center', backgroundColor: 'rgba(255,255,255,0.05)', padding: '6px', borderRadius: '6px'}}>
                                            <span style={{lineHeight: 1.2}}>Dia {g.day} - {g.time}<br/><span style={{fontSize: '0.75rem', opacity: 0.8}}>vs </span><b>{opponent}</b></span>
                                            <span style={{color: victory ? '#48bb78' : '#f56565', fontWeight: '900', fontSize: '1.05rem', backgroundColor: 'rgba(0,0,0,0.4)', padding: '4px 8px', borderRadius: '4px'}}>{myScore} - {oppScore} {victory ? '(V)' : '(D)'}</span>
                                        </div>
                                    );
                                })}
                                {hoveredStats.jog === 0 && (
                                    <div style={{fontSize: '0.8rem', color: 'var(--text-muted)'}}>Nenhum jogo concluído.</div>
                                )}
                            </div>
                        )}

                        <button 
                            className={`back-to-top ${showScroll ? 'visible' : ''}`}
                            onClick={scrollToTop}
                            title="Voltar ao Topo"
                        >
                            ↑
                        </button>
                    </div>
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
